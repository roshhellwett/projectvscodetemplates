<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectVSCode Presets - Your Perfect VS Code Setup</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --border: #30363d;
            --card-hover: #1c2128;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 80px 20px 60px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        header .tagline {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .install-cmd {
            display: inline-block;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 24px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.9rem;
            color: var(--accent);
        }

        section {
            padding: 60px 0;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 32px;
            text-align: center;
        }

        .quiz-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .quiz-question {
            margin-bottom: 24px;
        }

        .quiz-question label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .quiz-question select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
        }

        .quiz-question select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: normal;
        }

        .radio-group input {
            accent-color: var(--accent);
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            background: #4090e0;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .preset-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
            opacity: 1;
            transform: translateY(0);
        }

        .preset-card.hidden {
            display: none;
        }

        .preset-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .preset-card.highlight {
            border-color: var(--success);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
        }

        .preset-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .preset-icon {
            font-size: 1.5rem;
        }

        .preset-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .preset-description {
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        .preset-badges {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-category {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .badge-extensions {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
        }

        .badge-difficulty {
            background: rgba(139, 148, 158, 0.15);
            color: var(--text-secondary);
        }

        .color-strip {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .color-square {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .preset-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .extensions-list {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .extensions-list h4 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .extension-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .extension-item::before {
            content: "•";
            color: var(--accent);
        }

        .result-banner {
            background: var(--success);
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
            display: none;
        }

        .result-banner.show {
            display: block;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
        }

        .comparison-table th, .comparison-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .comparison-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .comparison-table tr:hover td {
            background: var(--bg-tertiary);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .ext-toggle {
            cursor: pointer;
            color: var(--accent);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.75rem;
            }

            .presets-grid {
                grid-template-columns: 1fr;
            }

            .quiz-section {
                padding: 24px;
            }

            .comparison-table {
                font-size: 0.85rem;
            }

            .comparison-table th, .comparison-table td {
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .install-cmd {
                font-size: 0.75rem;
                padding: 10px 16px;
            }

            .preset-actions {
                flex-direction: column;
            }

            .preset-actions .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>ProjectVSCode Presets</h1>
            <p class="tagline">Your perfect VS Code setup in 60 seconds</p>
            <code class="install-cmd">bash &lt;(curl -s https://git.io/vscode-presets)</code>
        </div>
    </header>

    <section class="container">
        <h2>Find Your Perfect Preset</h2>
        <div class="quiz-section">
            <div id="resultBanner" class="result-banner"></div>
            <div class="quiz-question">
                <label>What do you code?</label>
                <select id="q1">
                    <option value="">Select an option...</option>
                    <option value="python">Python / Data Science / ML</option>
                    <option value="web">Web (HTML, CSS, JavaScript, React)</option>
                    <option value="fullstack">Full-Stack (Frontend + Backend + DB)</option>
                    <option value="cpp">C / C++ (university, systems)</option>
                    <option value="competitive">Competitive Programming (contests, DSA)</option>
                    <option value="java">Java (university, Android)</option>
                    <option value="rustgo">Rust or Go (systems, backend)</option>
                    <option value="mobile">Mobile (Flutter, React Native)</option>
                    <option value="devops">DevOps / Cloud / Infra</option>
                    <option value="writing">I just write and take notes</option>
                </select>
            </div>
            <div class="quiz-question">
                <label>Experience level?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q2" value="beginner"> Complete beginner (< 6 months)</label>
                    <label><input type="radio" name="q2" value="learning"> Learning (6 months - 2 years)</label>
                    <label><input type="radio" name="q2" value="professional"> Working professional</label>
                </div>
            </div>
            <div class="quiz-question">
                <label>How do you use VS Code?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q3" value="coding"> Just coding</label>
                    <label><input type="radio" name="q3" value="stream"> I stream or record content</label>
                    <label><input type="radio" name="q3" value="zen"> I want minimal distractions</label>
                    <label><input type="radio" name="q3" value="ssh"> Remote server / SSH work</label>
                </div>
            </div>
            <div class="quiz-question">
                <label>Operating system?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q4" value="unix"> Linux / Mac</label>
                    <label><input type="radio" name="q4" value="windows"> Windows</label>
                </div>
            </div>
            <button class="btn" onclick="findPreset()">Find My Preset</button>
        </div>
    </section>

    <section class="container">
        <h2>All Presets</h2>
        <div class="filters">
            <button class="filter-btn active" onclick="filterPresets('all')">All</button>
            <button class="filter-btn" onclick="filterPresets('student')">Student</button>
            <button class="filter-btn" onclick="filterPresets('professional')">Professional</button>
            <button class="filter-btn" onclick="filterPresets('lifestyle')">Lifestyle</button>
        </div>
        <div class="presets-grid" id="presetsGrid"></div>
    </section>

    <section class="container">
        <h2>Quick Comparison</h2>
        <div style="overflow-x: auto;">
            <table class="comparison-table">
                <thead>
                    <tr>
                        <th>Preset</th>
                        <th>For</th>
                        <th>Font Size</th>
                        <th>Theme</th>
                        <th>Extensions</th>
                        <th>Difficulty</th>
                    </tr>
                </thead>
                <tbody id="comparisonTable"></tbody>
            </table>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>ProjectVSCode Presets by <a href="https://github.com/zenithopensourceprojects" target="_blank">Zenith Open Source Projects</a></p>
            <p style="margin-top: 8px;">MIT License</p>
        </div>
    </footer>

    <div id="toast" class="toast">Copied!</div>

                    <div class="ext-toggle" onclick="toggleExtensions('${p.id}')">View Extensions ▼</div>
                    <div id="ext-${p.id}" class="extensions-list" style="display: none;">
                        <h4>Recommended Extensions</h4>
                        ${p.extensions.map(e => `<div class="extension-item">${e}</div>`).join('')}
                    </div>
                </div>
            `).join('');

            renderComparisonTable();
        }

        function getPresetIcon(id) {
            const icons = {
                "python-beginner": "🐍",
                "python-professional": "🐍",
                "competitive-programming": "🏆",
                "java-student": "☕",
                "web-dev-frontend": "🌐",
                "web-dev-fullstack": "🚀",
                "c-cpp-systems": "⚙️",
                "data-science": "📊",
                "devops-cloud": "☁️",
                "mobile-flutter": "📱",
                "rust-systems": "🦀",
                "go-backend": "🔧",
                "minimal-zen": "🧘",
                "streamer-content-creator": "🎬",
                "remote-ssh-server": "🖥️"
            };
            return icons[id] || "📦";
        }

        function renderComparisonTable() {
            const tbody = document.getElementById('comparisonTable');
            tbody.innerHTML = presets.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.description.split('.')[0]}</td>
                    <td>${settingsData[p.id]?.['editor.fontSize'] || 14}px</td>
                    <td>${settingsData[p.id]?.['workbench.colorTheme'] || 'N/A'}</td>
                    <td>${p.extensions.length}</td>
                    <td>${'⭐'.repeat(p.difficulty === 'beginner' ? 1 : p.difficulty === 'intermediate' ? 2 : 3)}</td>
                </tr>
            `).join('');
        }

        function filterPresets(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.preset-card').forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        function toggleExtensions(id) {
            const el = document.getElementById(`ext-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function findPreset() {
            const q1 = document.getElementById('q1').value;
            const q2 = document.querySelector('input[name="q2"]:checked')?.value;
            const q3 = document.querySelector('input[name="q3"]:checked')?.value;

            if (!q1) {
                alert('Please select what you code!');
                return;
            }

            let presetId = 'python-beginner';

            if (q1 === 'python') {
                if (q3 === 'stream') presetId = 'streamer-content-creator';
                else if (q3 === 'zen') presetId = 'minimal-zen';
                else presetId = q2 === 'professional' ? 'python-professional' : 'python-beginner';
            } else if (q1 === 'web') {
                presetId = 'web-dev-frontend';
            } else if (q1 === 'fullstack') {
                presetId = 'web-dev-fullstack';
            } else if (q1 === 'cpp') {
                presetId = 'c-cpp-systems';
            } else if (q1 === 'competitive') {
                presetId = 'competitive-programming';
            } else if (q1 === 'java') {
                presetId = 'java-student';
            } else if (q1 === 'rustgo') {
                presetId = 'rust-systems';
            } else if (q1 === 'mobile') {
                presetId = 'mobile-flutter';
            } else if (q1 === 'devops') {
                presetId = 'devops-cloud';
            } else if (q1 === 'writing') {
                if (q3 === 'stream') presetId = 'streamer-content-creator';
                else if (q3 === 'ssh') presetId = 'remote-ssh-server';
                else presetId = 'minimal-zen';
            }

            const preset = presets.find(p => p.id === presetId);
            const banner = document.getElementById('resultBanner');
            banner.textContent = `✅ Your perfect preset: ${preset.name}`;
            banner.classList.add('show');

            document.querySelectorAll('.preset-card').forEach(card => card.classList.remove('highlight'));
            const targetCard = document.getElementById(`card-${presetId}`);
            if (targetCard) {
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => targetCard.classList.add('highlight'), 500);
            }
        }

        function downloadSettings(presetId) {
            const settings = settingsData[presetId] || {};
            const blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'settings.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyInstallCmd(presetId) {
            const cmd = `bash <(curl -s https://raw.githubusercontent.com/zenithopensourceprojects/projectvscodetemplates/main/scripts/install.sh) --preset ${presetId}`;
            navigator.clipboard.writeText(cmd).then(() => showToast());
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.addEventListener('DOMContentLoaded', () => renderPresets());
    </script>
</body>
</html>
